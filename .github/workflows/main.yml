name: Build Tamil Bible APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate icons
        run: pip install Pillow --quiet && python3 scripts/generate_icons.py

      - name: Check index.html
        run: |
          if [ ! -f android/app/src/main/assets/www/index.html ]; then
            echo "ERROR: index.html not found!"; exit 1
          fi
          echo "OK: $(wc -c < android/app/src/main/assets/www/index.html) bytes"

      - name: Build APK
        run: gradle assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tamil-bible-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
